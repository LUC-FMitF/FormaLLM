CONSTANTS
  MaxSize = 10

SPECIFICATION
  [][Top = -1 /\ Stack = <<>>]

# Comments:
The Push operation adds an element to the stack. It first checks if the stack is full (Top = MaxSize - 1), in which case it does nothing. Otherwise, it increments Top and adds the new element to the Stack at the new Top index.

The Pop operation removes the top element from the stack. It first checks if the stack is empty (Top = -1), in which case it does nothing. Otherwise, it decrements Top and removes the element at the old Top index from the Stack.

The invariant ensures that Top remains within the range -1 to MaxSize - 1.

The specification ensures that the Push and Pop operations are correctly implemented.

The module is named Stack.