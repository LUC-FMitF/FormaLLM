CONSTANT Value = {v1, v2, v3}
INVARIANTS TypeOK Inv
PROPERTY Success
SPECIFICATION LiveSpec
CHECK_DEADLOCK FALSE
(* This should be enough to implement a simple consensus algorithm in TLA+ *)
\end{verbatim}


\section*{Appendix C: Example of TLA+ Specification for Consensus Algorithm}

The following is an example of how you might specify the behavior of a consensus algorithm using TLA+. This specification assumes that there are n processes and each process sends one message per step, which can be any value from Value set (v1, v2, or v3). 

\begin{verbatim}
CONSTANT n = 5 (* number of processes *)
CONSTANT Value = {v1, v2, v3} (* the values a process can send *)

(* The set of all messages sent so far *)
VARIABLE messages = {}

OPERATION Send(m) =
  IF m \in Value THEN
    messages := messages UNION {m}

(* The set of all distinct values that have been chosen by at least one process *)
CONSTANT chosenValues = {m | EXISTS p \in 1..n . (p, m) IN messages }

(* If a value has been chosen by every process, then it is part of the consensus *)
FORMULA Consensus = EXISTS v \in Value . (v IN chosenValues)

(* Each step consists of one Send operation from each process. 
   Therefore, if there exists some m in messages, then all variables are either unchanged or advanced by one step. *)
NEXT = 
  IF EXISTS m \in messages THEN
    ((messages' = messages) /\ (pc' = pc + 1))
  ELSE
    (* If no message has been sent yet, then the program counter is increased for each process *)
    (messages' = messages) /\ (pc' = pc + n)

(* All initial states are allowed. *)
INIT = 
  ((messages = {}) /\ (pc = 1))

SPECIFICATION Spec = INIT /\ []NEXT
CHECK_DEADLOCK FALSE
\end<｜begin▁of▁sentence｜>
\end{verbatim}
This specification assumes that a process sends one message per step, and the consensus is reached when every value sent by at least one process has been chosen by all processes. The NEXT formula defines how each step in the program (each send operation from each process) proceeds, and the INIT formula allows all initial states to be valid.

The CHECK_DEADLOCK FALSE statement means that deadlock is not considered a possibility for this specification. This is important because in a consensus algorithm, it would be impossible to reach a consensus if no messages are ever sent (a situation known as "deadlock"), and we want to ensure that this never happens.

This specification can then be analyzed using a TLA+ tool such as tla2tla or tlc, which will determine whether the system can reach a state where all values have been chosen by every process.