2) Each move consists of taking the upper disk from one pile and placing it on top of another pile or on an empty pile.
3) No disk may be placed on top of a smaller disk. 

The puzzle starts with the disks in a neat stack in ascending order of size on one peg, the smallest at the top so that a bigger disk always sits on a smaller disk. 

The goal of the puzzle is to move the entire stack to another peg, obeying the rules and the strategy:
1) You can only move a single disk at a time.
2) If you have a choice between two disks, you must choose the one which is on top of the tower. 
3) You may not place a larger disk on a smaller one. 

