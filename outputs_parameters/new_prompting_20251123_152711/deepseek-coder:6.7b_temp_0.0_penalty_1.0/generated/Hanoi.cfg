CONSTANTS
  D = 3, N = 3 (* D and N can be adjusted *)
SPECIFICATION Spec
INVARIANTS rightTower \# (2^N)-1
***************************************************************************)
(* Helper functions to check if a tower is empty or not.                  *)
(***************************************************************************)
IsEmpty[t] == EMPTYSET = t
NotEmpty[t] == ~ IsEmpty[t]

(***************************************************************************)
(* Function to get the top disk of a tower                                  *)
(***************************************************************************)
TopDisk[t] == 
  IF NotEmpty[t]
  THEN LAST(t)
  ELSE \_

(***************************************************************************)
(* Helper function to check if a disk can be moved off of the given tower    *)
(***************************************************************************)
CanMoveOff[t, d] == 
  IF NotEmpty[t] /\ TopDisk[t] = d
  THEN TRUE
  ELSE FALSE

(***************************************************************************)
(* Helper function to check if a disk can be moved onto the given tower      *)
(***************************************************************************)
CanMoveOn[t, d] == 
  IF NotEmpty[t] /\ TopDisk[t] > d
  THEN TRUE
  ELSE FALSE

(***************************************************************************)
(* Function to get the next move for a given tower                          *)
(***************************************************************************)
NextMove[t] == 
  LET disks == {0, 1} \ UNION {i | i \in 0..((2^D)-1) : CanMoveOn[towers[i], t]}
  IN IF Cardinality(disks) = 0 THEN \_ ELSE MIN(disks)
***************************************************************************)
(* Function to move a disk from one tower to another                        *)
(***************************************************************************)
Move[from, to] == 
  IF CanMoveOff[from, to] /\ CanMoveOn[to, to]
  THEN (from \ {TopDisk[from]}) UNION {to} ELSE from
(* Note: This is a simplified model of the Hanoi towers problem. It does not cover all possible actions that disks can perform and it assumes that all less significant bits are 0. *)
